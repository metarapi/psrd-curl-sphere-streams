<!DOCTYPE html>
<html lang="en" class="dark" data-theme="vscode">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/style.css">
  <title>Sphere PSRD Ribbon Particle Prototype</title>
</head>

<!-- Alpine State holds the exact default values from your Python app -->

<body class="bg-base-100 text-base-content h-screen w-screen overflow-hidden flex flex-col antialiased"
  x-init="window.__simState = $data" x-data="{
    isPlaying: true,
    particleCount: 80000,
    ribbonWidth: 0.0005,
    speedFactor: 0.05,
    lifetimeMin: 1.0,
    lifetimeMax: 5.0,
    decayTime: 0.5,
    decayExponent: 1.0,
    alphaFalloff: 1.55,
    shrinkWidthDying: true,
    noiseFrequency: 1.0,
    noiseAlpha: 0.0,
    fieldStrength: 0.75,
    blendMode: 'alpha',
    showDebugCenters: false
  }">

  <!-- Navbar -->
  <nav class="navbar bg-base-200 border-b border-base-300 z-10 flex-none px-4">
    <div class="flex-1 flex items-center gap-4">
      <div>
        <h1 class="text-lg font-bold leading-tight">Sphere PSRD Ribbon Particle Prototype</h1>
        <p class="text-xs text-base-content/60">PSRDnoise3 baked into cubemap-style 2D array.</p>
      </div>
    </div>
    <a href="https://github.com/metarapi/psrd-curl-sphere-streams"
      class="size-10 text-base-content hover:text-secondary transition-colors motion-safe:hover:scale-110 bg-transparent hover:bg-transparent">
      <svg viewBox="0 0 16 16" class="size-10" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
      0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
      -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
      -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18
      1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
      1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19
      0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
      </svg>
    </a>

  </nav>

  <!-- Main Layout Wrapper -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Left Sidebar (Replaces your QScrollArea) -->
    <aside class="w-[380px] bg-base-200 border-r border-base-300 flex-none overflow-y-auto p-4 space-y-6">

      <!-- Playback Controls -->
      <div class="card bg-base-100 shadow-sm border border-base-300">
        <div class="card-body p-4 space-y-3">
          <h2 class="card-title text-sm opacity-70 uppercase tracking-wider">Playback</h2>
          <div class="flex gap-2">
            <button class="btn btn-sm btn-primary flex-1" @click="isPlaying = true">Play</button>
            <button class="btn btn-sm btn-secondary flex-1" @click="isPlaying = false">Pause</button>
            <button class="btn btn-sm btn-outline flex-1"
              @click="isPlaying = true; $dispatch('restart-sim')">Restart</button>
          </div>
        </div>
      </div>

      <!-- Field Parameters -->
      <div class="card bg-base-100 shadow-sm border border-base-300">
        <div class="card-body p-4 space-y-4">
          <h2 class="card-title text-sm opacity-70 uppercase tracking-wider">Field</h2>

          <!-- Noise Frequency -->
          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Noise Frequency</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="noiseFrequency" min="0" max="12" step="0.01"
                class="range range-primary flex-1" />
              <input type="number" x-model.number="noiseFrequency" min="0" max="12" step="0.01"
                class="input input-sm input-bordered w-20 text-right font-mono" />
            </div>
          </div>

          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Noise Alpha</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="noiseAlpha" min="0" max="6.28319" step="0.01"
                class="range range-primary flex-1" />
              <input type="number" x-model.number="noiseAlpha" min="0" max="6.28319" step="0.01"
                class="input input-sm input-bordered w-20 text-right font-mono" />
            </div>
          </div>

          <!-- Curl Strength -->
          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Curl Strength</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="fieldStrength" min="0.05" max="3.0" step="0.01"
                class="range range-primary flex-1" />
              <input type="number" x-model.number="fieldStrength" min="0.05" max="3.0" step="0.01"
                class="input input-sm input-bordered w-20 text-right font-mono" />
            </div>
          </div>
        </div>
      </div>

      <!-- Simulation Parameters -->
      <div class="card bg-base-100 shadow-sm border border-base-300">
        <div class="card-body p-4 space-y-4">
          <h2 class="card-title text-sm opacity-70 uppercase tracking-wider">Simulation</h2>

          <!-- Particle Count -->
          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Particle Count</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="particleCount" min="1000" max="160000" step="1000"
                class="range range-secondary flex-1" />
              <input type="number" x-model.number="particleCount" min="1000" max="160000" step="1000"
                class="input input-sm input-bordered w-24 text-right font-mono" />
            </div>
          </div>

          <!-- Ribbon Width -->
          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Ribbon Width</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="ribbonWidth" min="0.0005" max="0.05" step="0.0005"
                class="range range-secondary flex-1" />
              <input type="number" x-model.number="ribbonWidth" min="0.0005" max="0.05" step="0.0005"
                class="input input-sm input-bordered w-24 text-right font-mono" />
            </div>
          </div>

          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Speed Factor</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="speedFactor" min="0.05" max="2.5" step="0.01"
                class="range range-secondary flex-1" />
              <input type="number" x-model.number="speedFactor" min="0.05" max="2.5" step="0.01"
                class="input input-sm input-bordered w-24 text-right font-mono" />
            </div>
          </div>

          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Lifetime Min (s)</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="lifetimeMin" min="0.1" max="30" step="0.1"
                class="range range-secondary flex-1" />
              <input type="number" x-model.number="lifetimeMin" min="0.1" max="30" step="0.1"
                class="input input-sm input-bordered w-24 text-right font-mono" />
            </div>
          </div>

          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Lifetime Max (s)</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="lifetimeMax" min="0.1" max="30" step="0.1"
                class="range range-secondary flex-1" />
              <input type="number" x-model.number="lifetimeMax" min="0.1" max="30" step="0.1"
                class="input input-sm input-bordered w-24 text-right font-mono" />
            </div>
          </div>

          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Decay Time (s)</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="decayTime" min="0.1" max="8" step="0.05"
                class="range range-secondary flex-1" />
              <input type="number" x-model.number="decayTime" min="0.1" max="8" step="0.05"
                class="input input-sm input-bordered w-24 text-right font-mono" />
            </div>
          </div>

          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Alpha Falloff</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="alphaFalloff" min="0.1" max="6" step="0.05"
                class="range range-secondary flex-1" />
              <input type="number" x-model.number="alphaFalloff" min="0.1" max="6" step="0.05"
                class="input input-sm input-bordered w-24 text-right font-mono" />
            </div>
          </div>

          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Fade Exponent</span></label>
            <div class="flex gap-2 items-center">
              <input type="range" x-model.number="decayExponent" min="0.25" max="4" step="0.05"
                class="range range-secondary flex-1" />
              <input type="number" x-model.number="decayExponent" min="0.25" max="4" step="0.05"
                class="input input-sm input-bordered w-24 text-right font-mono" />
            </div>
          </div>
        </div>
      </div>

      <!-- Display Options -->
      <div class="card bg-base-100 shadow-sm border border-base-300">
        <div class="card-body p-4 space-y-4">
          <h2 class="card-title text-sm opacity-70 uppercase tracking-wider">Display</h2>

          <!-- Blend Mode Dropdown -->
          <div class="form-control">
            <label class="label pt-0"><span class="label-text">Blend Mode</span></label>
            <select class="select select-sm select-bordered w-full" x-model="blendMode">
              <option value="alpha">Premultiplied Alpha</option>
              <option value="additive">Additive</option>
            </select>
          </div>

          <!-- Toggles -->

          <div class="flex items-center gap-2">
            <input type="checkbox" id="shrinkWidthToggle" x-model="shrinkWidthDying"
              class="switch switch-primary switch-sm" />
            <label class="label-text cursor-pointer" for="shrinkWidthToggle">Shrink width while dying</label>
          </div>

        </div>
      </div>

    </aside>

    <!-- Right Side Canvas -->
    <main class="flex-1 bg-black relative flex items-center justify-center">
      <!-- We set width/height to 100% and absolute inset-0 to prevent layout shifting -->
      <canvas id="webgpu-canvas" class="absolute inset-0 w-full h-full block" x-ref="canvas"></canvas>

      <!-- Optional overlay for stats (Replaces your status/info label) -->
      <div class="absolute bottom-4 left-4 pointer-events-none text-white/50 font-mono text-xs z-10">
        <p x-text="`Particles: ${particleCount}`"></p>
        <p x-text="`Blend: ${blendMode}`"></p>
      </div>
    </main>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
